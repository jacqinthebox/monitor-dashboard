name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: docker login acrworldmonitorsc02.azurecr.io -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -t acrworldmonitorsc02.azurecr.io/worldmonitor:${{ github.sha }} \
                       -t acrworldmonitorsc02.azurecr.io/worldmonitor:latest .
          docker push acrworldmonitorsc02.azurecr.io/worldmonitor:${{ github.sha }}
          docker push acrworldmonitorsc02.azurecr.io/worldmonitor:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ca-worldmonitor-sc-02 \
            --resource-group rg-worldmonitor-sc-02 \
            --image acrworldmonitorsc02.azurecr.io/worldmonitor:${{ github.sha }}
